<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enervit — Shopify Category & Product Planner</title>
<style>
  :root {
    --bg: #f5f7fa; --surface: #ffffff; --surface2: #f0f2f5; --border: #e2e5eb;
    --text: #1a1d27; --text-muted: #6b7280;
    --accent: #2563b3; --accent-bg: rgba(37,99,179,.08);
    --blue: #2563b3; --red: #dc2626; --green: #16a34a; --gold: #f59e0b;
    --orange: #ea580c; --purple: #7c3aed; --yellow: #ca8a04;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); line-height:1.5; }

  header { background:var(--surface); border-bottom:1px solid var(--border); padding:14px 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; box-shadow:0 1px 3px rgba(0,0,0,.06); }
  header h1 { font-size:18px; font-weight:600; }
  header h1 span { color:var(--accent); }
  .header-actions { display:flex; gap:8px; }
  .header-actions button { padding:6px 14px; border-radius:6px; border:1px solid var(--border); background:var(--surface2); color:var(--text); cursor:pointer; font-size:13px; transition:all .15s; }
  .header-actions button:hover { border-color:var(--accent); color:var(--accent); }
  .header-actions button.primary { background:var(--accent); border-color:var(--accent); color:#fff; }

  .stats-bar { background:var(--surface); border-bottom:1px solid var(--border); padding:10px 24px; display:flex; gap:24px; font-size:13px; color:var(--text-muted); flex-wrap:wrap; }
  .stats-bar b { color:var(--text); margin-right:4px; }
  .stat-brand { display:inline-flex; align-items:center; gap:4px; }
  .stat-dot { width:8px; height:8px; border-radius:50%; display:inline-block; }

  .layout { display:grid; grid-template-columns:300px 1fr; height:calc(100vh - 100px); }

  .sidebar { background:var(--surface); border-right:1px solid var(--border); overflow-y:auto; padding:16px; box-shadow:1px 0 4px rgba(0,0,0,.04); }
  .sidebar h2 { font-size:12px; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); margin-bottom:10px; }
  .cat-group { margin-bottom:14px; }
  .cat-group-title { font-size:11px; text-transform:uppercase; letter-spacing:.8px; color:var(--text-muted); margin-bottom:4px; padding:4px 0; border-bottom:1px solid var(--border); font-weight:600; }
  .cat-item { padding:5px 10px; border-radius:6px; cursor:pointer; font-size:13px; display:flex; align-items:center; justify-content:space-between; transition:background .15s; margin-bottom:1px; user-select:none; }
  .cat-item:hover { background:var(--surface2); }
  .cat-item.active { background:var(--accent); color:#fff; }
  .cat-item .count { background:var(--surface2); padding:1px 7px; border-radius:10px; font-size:11px; color:var(--text-muted); min-width:22px; text-align:center; }
  .cat-item.active .count { background:rgba(255,255,255,.2); color:#fff; }
  .cat-icon { margin-right:6px; font-size:13px; }
  .cat-label-flex { display:flex; align-items:center; gap:4px; flex:1; min-width:0; }
  .cat-label-text { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  .main { overflow-y:auto; padding:20px; }
  .tabs { display:flex; gap:4px; margin-bottom:16px; flex-wrap:wrap; }
  .tab { padding:7px 14px; border-radius:6px; border:1px solid var(--border); background:var(--surface); color:var(--text-muted); cursor:pointer; font-size:13px; transition:all .15s; user-select:none; }
  .tab:hover { color:var(--text); }
  .tab.active { background:var(--accent); border-color:var(--accent); color:#fff; }

  .view-controls { display:flex; align-items:center; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
  .search-box { flex:1; min-width:200px; padding:8px 12px; border-radius:6px; border:1px solid var(--border); background:var(--surface); color:var(--text); font-size:13px; outline:none; }
  .search-box:focus { border-color:var(--accent); }
  .filter-btn { padding:5px 10px; border-radius:6px; border:1px solid var(--border); background:var(--surface); color:var(--text-muted); cursor:pointer; font-size:12px; transition:all .15s; user-select:none; }
  .filter-btn:hover, .filter-btn.active { border-color:var(--accent); color:var(--accent); background:var(--accent-bg); }
  .filter-btn.brand-enervit.active { border-color:var(--blue); color:var(--blue); background:rgba(37,99,179,.08); }
  .filter-btn.brand-c21.active { border-color:var(--red); color:var(--red); background:rgba(220,38,38,.08); }
  .filter-btn.brand-purepro.active { border-color:var(--green); color:var(--green); background:rgba(22,163,74,.08); }
  .filter-btn.brand-proteindeal.active { border-color:var(--gold); color:var(--gold); background:rgba(245,158,11,.08); }

  .product-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:12px; }
  .product-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:14px; transition:all .2s; position:relative; box-shadow:0 1px 3px rgba(0,0,0,.04); }
  .product-card:hover { border-color:var(--accent); transform:translateY(-1px); box-shadow:0 4px 12px rgba(0,0,0,.08); }
  .product-card.brand-enervit { border-left:3px solid var(--blue); }
  .product-card.brand-c21 { border-left:3px solid var(--red); }
  .product-card.brand-purepro { border-left:3px solid var(--green); }
  .product-card.brand-proteindeal { border-left:3px solid var(--gold); }

  .brand-badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; margin-bottom:6px; }
  .badge-enervit { background:rgba(37,99,179,.1); color:var(--blue); }
  .badge-c21 { background:rgba(220,38,38,.08); color:var(--red); }
  .badge-purepro { background:rgba(22,163,74,.08); color:var(--green); }
  .badge-proteindeal { background:rgba(245,158,11,.08); color:var(--gold); }

  .product-name { font-size:14px; font-weight:600; margin-bottom:2px; }
  .product-sku { font-size:12px; color:var(--text-muted); font-style:italic; margin-bottom:6px; }
  .product-price { font-size:14px; font-weight:600; color:var(--green); margin-bottom:6px; }
  .product-price .old { text-decoration:line-through; color:var(--text-muted); font-weight:400; margin-left:6px; font-size:12px; }

  .tag-row { display:flex; flex-wrap:wrap; gap:3px; margin-bottom:5px; }
  .tag { display:inline-block; padding:1px 7px; border-radius:3px; font-size:10px; background:var(--surface2); color:var(--text-muted); border:1px solid var(--border); }
  .tag.phase { background:rgba(37,99,179,.06); color:var(--blue); border-color:rgba(37,99,179,.15); }
  .tag.flavor { background:rgba(234,88,12,.06); color:var(--orange); border-color:rgba(234,88,12,.12); }
  .tag.pack { background:rgba(124,58,237,.06); color:var(--purple); border-color:rgba(124,58,237,.12); }

  .rel-section { margin-top:6px; padding:5px 8px; border-radius:5px; font-size:11px; }
  .rel-cross { background:rgba(14,165,160,.06); border:1px solid rgba(14,165,160,.12); }
  .rel-upsell { background:rgba(234,88,12,.06); border:1px solid rgba(234,88,12,.12); }
  .rel-label { font-weight:600; font-size:10px; text-transform:uppercase; letter-spacing:.5px; margin-bottom:2px; }
  .rel-cross .rel-label { color:#0ea5a0; }
  .rel-upsell .rel-label { color:var(--orange); }
  .rel-item { display:inline-block; padding:1px 7px; border-radius:3px; font-size:10px; margin:1px 2px; cursor:default; }
  .rel-cross .rel-item { background:rgba(14,165,160,.1); color:#0ea5a0; }
  .rel-upsell .rel-item { background:rgba(234,88,12,.1); color:var(--orange); }

  .phase-group { margin-bottom:24px; }
  .phase-group-title { font-size:16px; font-weight:600; margin-bottom:10px; padding:8px 12px; border-radius:8px; background:var(--surface); border:1px solid var(--border); display:flex; align-items:center; gap:8px; }

  .info-panel { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:16px; margin-bottom:16px; }
  .info-panel h3 { font-size:14px; margin-bottom:8px; font-weight:600; }
  .info-panel h4 { font-size:13px; margin:10px 0 6px; font-weight:600; }
  .info-panel p, .info-panel li { font-size:13px; color:var(--text-muted); }
  .info-panel ul { padding-left:18px; }
  .info-panel li { margin-bottom:4px; }
  .info-panel code { background:var(--surface2); padding:1px 5px; border-radius:3px; font-size:11px; font-family:'SF Mono',Monaco,Consolas,monospace; }
  .info-panel pre { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:12px; font-size:11px; overflow-x:auto; font-family:'SF Mono',Monaco,Consolas,monospace; margin:8px 0; line-height:1.6; }
  .info-panel table { width:100%; border-collapse:collapse; font-size:12px; margin:8px 0; }
  .info-panel th, .info-panel td { padding:6px 10px; border:1px solid var(--border); text-align:left; }
  .info-panel th { background:var(--surface2); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.5px; }

  .tree-node { margin-left:20px; padding:4px 0; }
  .tree-root { margin-left:0; }
  .tree-label { display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:6px; background:var(--surface); border:1px solid var(--border); font-size:13px; margin-bottom:4px; cursor:default; }
  .tree-handle { font-size:10px; color:var(--text-muted); font-family:monospace; }
  .tree-seo { font-size:10px; color:var(--text-muted); font-style:italic; margin-left:28px; margin-bottom:4px; }

  .schema-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:12px; margin-top:12px; }
  .schema-card { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:12px; }
  .schema-card h4 { font-size:13px; margin-bottom:4px; }
  .schema-card .key { font-size:10px; color:var(--text-muted); font-family:monospace; margin-bottom:6px; }
  .schema-card .values { display:flex; flex-wrap:wrap; gap:3px; }
  .fv { padding:2px 8px; border-radius:3px; font-size:11px; background:var(--bg); color:var(--text-muted); border:1px solid var(--border); display:inline-block; }

  .crosssell-map { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:12px; }
  .cs-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:12px; }
  .cs-card h4 { font-size:13px; margin-bottom:6px; }
  .cs-arrow { color:var(--text-muted); font-size:11px; margin:4px 0 2px; font-weight:600; }

  .export-area { display:none; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:16px; margin-top:16px; }
  .export-area.show { display:block; }
  .export-area textarea { width:100%; min-height:300px; background:var(--surface2); color:var(--text); border:1px solid var(--border); border-radius:6px; padding:12px; font-family:monospace; font-size:12px; resize:vertical; }

  .tab-content { display:none; }
  .tab-content.active { display:block; }

  .no-results { text-align:center; padding:40px; color:var(--text-muted); font-size:14px; }

  @media (max-width:900px) {
    .layout { grid-template-columns:1fr; }
    .sidebar { max-height:250px; border-right:none; border-bottom:1px solid var(--border); }
    .product-grid { grid-template-columns:1fr; }
    header { flex-direction:column; gap:10px; }
  }
</style>
</head>

</div>

// ============================================================
// HELPERS
// ============================================================
function brandClass(b) {
  if (b === 'C2:1 PRO') return 'c21';
  if (b === 'Pure-PRO') return 'purepro';
  if (b === 'The Protein Deal') return 'proteindeal';
  return 'enervit';
}

function phaseLabel(p) {
  const m = {Pred:'Pred',Behem:'Behem',Po:'Po',Mezi:'Mezi'};
  return m[p] || p;
}

function findProduct(sku) {
  return PRODUCTS.find(p => p.sku === sku);
}

function getProductCountForCategory(groupKey, catId) {
  if (groupKey === 'phase') {
    const phaseMap = {pred:'Pred',behem:'Behem',po:'Po',mezi:'Mezi'};
    const ph = phaseMap[catId];
    return PRODUCTS.filter(p => p.phase.includes(ph)).length;
  }
  if (groupKey === 'type') {
    const cat = CATEGORIES.type.find(c => c.id === catId);
    if (!cat) return 0;
    return PRODUCTS.filter(p => cat.match.includes(p.type)).length;
  }
  if (groupKey === 'brand') {
    const cat = CATEGORIES.brand.find(c => c.id === catId);
    if (!cat) return 0;
    return PRODUCTS.filter(p => p.brand === cat.name).length;
  }
  return 0;
}

function toggleSidebar(group, id) {
  if (sidebarFilter && sidebarFilter.group === group && sidebarFilter.id === id) {
    sidebarFilter = null;
  } else {
    sidebarFilter = {group, id};
  }
  // Switch to products tab
  if (currentTab !== 'all') {
    switchTab('all');
  }
  renderSidebar();
  renderProducts();
}

// ============================================================
// FILTER PRODUCTS
// ============================================================
function getFilteredProducts() {
  let list = [...PRODUCTS];

  // Brand filter
  if (brandFilter !== 'all') {
    list = list.filter(p => p.brand === brandFilter);
  }

  // Search
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(p => p.name.toLowerCase().includes(q) || p.sku.toLowerCase().includes(q));
  }

  // Sidebar filter
  if (sidebarFilter) {
    if (sidebarFilter.group === 'phase') {
      const phaseMap = {pred:'Pred',behem:'Behem',po:'Po',mezi:'Mezi'};
      const ph = phaseMap[sidebarFilter.id];
      list = list.filter(p => p.phase.includes(ph));
    } else if (sidebarFilter.group === 'type') {
      const cat = CATEGORIES.type.find(c => c.id === sidebarFilter.id);
      if (cat) list = list.filter(p => cat.match.includes(p.type));
    } else if (sidebarFilter.group === 'brand') {
      const cat = CATEGORIES.brand.find(c => c.id === sidebarFilter.id);
      if (cat) list = list.filter(p => p.brand === cat.name);
    }
  }

  return list;
}

// ============================================================
// RENDER PRODUCT CARD
// ============================================================
function renderCard(p) {
  const bc = brandClass(p.brand);
  let html = `<div class="product-card brand-${bc}">`;
  html += `<span class="brand-badge badge-${bc}">${p.brand}</span>`;
  html += `<div class="product-name">${p.name}</div>`;
  html += `<div class="product-sku">SKU: ${p.sku}</div>`;

  // Price
  if (p.priceOld) {
    html += `<div class="product-price">${p.price} Kc <span class="old">${p.priceOld} Kc</span></div>`;
  } else {
    html += `<div class="product-price">${p.price} Kc</div>`;
  }

  // Phase badges
  if (p.phase.length) {
    html += '<div class="tag-row">';
    p.phase.forEach(ph => { html += `<span class="tag phase">${phaseLabel(ph)}</span>`; });
    html += '</div>';
  }

  // Flavors
  if (p.flavors.length) {
    html += '<div class="tag-row">';
    p.flavors.forEach(f => { html += `<span class="tag flavor">${f}</span>`; });
    html += '</div>';
  }

  // Packs
  if (p.packs.length) {
    html += '<div class="tag-row">';
    p.packs.forEach(pk => { html += `<span class="tag pack">${pk}</span>`; });
    html += '</div>';
  }

  // Cross-sell
  if (p.crossSell.length) {
    html += '<div class="rel-section rel-cross"><div class="rel-label">Cross-sell</div>';
    p.crossSell.forEach(sku => {
      const ref = findProduct(sku);
      html += `<span class="rel-item">${ref ? ref.name : sku}</span>`;
    });
    html += '</div>';
  }

  // Upsell
  if (p.upsell.length) {
    html += '<div class="rel-section rel-upsell"><div class="rel-label">Upsell</div>';
    p.upsell.forEach(sku => {
      const ref = findProduct(sku);
      html += `<span class="rel-item">${ref ? ref.name : sku}</span>`;
    });
    html += '</div>';
  }

  html += '</div>';
  return html;
}

// ============================================================
// RENDER PRODUCTS
// ============================================================
function renderProducts() {
  const grid = document.getElementById('product-grid');
  const filtered = getFilteredProducts();
  if (!filtered.length) {
    grid.innerHTML = '<div class="no-results">Zadne produkty neodpovidaji filtru.</div>';
    return;
  }
  grid.innerHTML = filtered.map(p => renderCard(p)).join('');
}

// ============================================================
// TABS
// ============================================================
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');

  // Show/hide view controls
  const vc = document.querySelector('.view-controls');
  if (vc) vc.style.display = tab === 'all' ? 'flex' : 'none';
}

// ============================================================
// EXPORT
// ============================================================
function doExport(format) {
  const area = document.getElementById('export-area');
  const output = document.getElementById('export-output');
  area.classList.add('show');

  if (format === 'json') {
    output.value = JSON.stringify(PRODUCTS, null, 2);
  } else if (format === 'csv') {
    let csv = 'SKU,Name,Brand,Type,Phase,Price,Flavors,Packs\n';
    PRODUCTS.forEach(p => {
      csv += `"${p.sku}","${p.name}","${p.brand}","${p.type}","${p.phase.join(';')}",${p.price},"${p.flavors.join(';')}","${p.packs.join(';')}"\n`;
    });
    output.value = csv;
  } else if (format === 'md') {
    let md = '# Enervit - Seznam produktu\n\n';
    md += '| SKU | Nazev | Znacka | Typ | Faze | Cena |\n';
    md += '|-----|-------|--------|-----|------|------|\n';
    PRODUCTS.forEach(p => {
      md += `| ${p.sku} | ${p.name} | ${p.brand} | ${p.type} | ${p.phase.join(', ')} | ${p.price} Kc |\n`;
    });
    output.value = md;
  }

  // Select text
  output.select();
}

// ============================================================
// INIT
// ============================================================
function init() {
  renderStats();
  renderSidebar();
  renderProducts();
  renderPhaseView();
  renderTreeView();
  renderSetupView();
  renderCrossSellView();
  renderSeoView();

  // Tab clicks
  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => switchTab(t.dataset.tab));
  });

  // Search
  document.getElementById('search-input').addEventListener('input', e => {
    searchQuery = e.target.value;
    renderProducts();
  });

  // Brand filters
  document.querySelectorAll('.filter-btn[data-brand]').forEach(btn => {
    btn.addEventListener('click', () => {
      brandFilter = btn.dataset.brand;
      document.querySelectorAll('.filter-btn[data-brand]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderProducts();
    });
  });
}

init();
